name: Build and Release
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build for ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows
            os: windows-latest
            artifact: MagicGatherer-Windows.zip
          - name: macOS
            os: macos-latest
            artifact: MagicGatherer.app.zip

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python Requirements
        shell: bash
        run: |
          if [ "${{ matrix.os }}" = "macos-latest" ]; then
            python3 -m pip install --upgrade pip
            python3 -m pip install -r requirements.txt
            python3 -m pip install pyinstaller
          else
            python -m pip install --upgrade pip
            pip install -r requirements.txt
            pip install pyinstaller
          fi

      - name: Generate Icons
        shell: bash
        run: |
          python3 -m pip install Pillow || pip install Pillow
          python3 -c "
          import os; from PIL import Image
          src = 'magic_gatherer_qt/logo.png' if os.path.exists('magic_gatherer_qt/logo.png') else 'icon.png'
          if os.path.exists(src):
              img = Image.open(src)
              w, h = img.size
              if w != h:
                  m = max(w, h)
                  sq = Image.new('RGBA', (m, m), (255,0,0,0))
                  sq.paste(img, ((m-w)//2, (m-h)//2))
                  img = sq
              img.save('icon.ico', format='ICO', sizes=[(256,256),(128,128),(64,64),(32,32)])
              img.save('icon.icns', format='ICNS')
          "

      # ── macOS ──────────────────────────────────────────────────────────────
      - name: Build with PyInstaller (macOS)
        if: matrix.name == 'macOS'
        shell: bash
        run: |
          ICON_ARGS=""
          if [ -f "icon.icns" ]; then ICON_ARGS="--icon=icon.icns"; fi
          # --collect-all PyQt5 bundles libqcocoa.dylib + all Qt platform plugins.
          # Without it, the app bounces on the dock and crashes immediately.
          python3 -m PyInstaller \
            --onedir --windowed \
            --paths magic_gatherer_qt/src \
            --add-data "magic_gatherer_qt/logo.png:." \
            --collect-all PyQt5 \
            --hidden-import pkg_resources \
            --hidden-import pkgutil \
            $ICON_ARGS \
            --name MagicGatherer \
            magic_gatherer_qt/src/main.py

      - name: Zip Artifact (macOS)
        if: matrix.name == 'macOS'
        run: |
          cd dist && zip -yr ${{ matrix.artifact }} MagicGatherer.app

      # ── Windows ────────────────────────────────────────────────────────────
      - name: Build GUI with PyInstaller (Windows)
        if: matrix.name == 'Windows'
        shell: bash
        run: |
          ICON_ARGS=""
          if [ -f "icon.ico" ]; then ICON_ARGS="--icon=icon.ico"; fi
          pyinstaller \
            --onefile --windowed \
            --paths magic_gatherer_qt/src \
            --add-data "magic_gatherer_qt/logo.png;." \
            --hidden-import pkgutil \
            $ICON_ARGS \
            --name MagicGatherer \
            magic_gatherer_qt/src/main.py

      - name: Build TUI Launcher (Windows)
        if: matrix.name == 'Windows'
        shell: bash
        run: |
          ICON_ARGS=""
          if [ -f "icon.ico" ]; then ICON_ARGS="--icon=icon.ico"; fi
          pyinstaller \
            --onefile --console \
            --paths magic_gatherer_qt/src \
            --hidden-import pkgutil \
            --hidden-import textual \
            $ICON_ARGS \
            --name MagicGathererTUI \
            magic_gatherer_qt/src/tui/app.py

      - name: Zip Windows Artifacts
        if: matrix.name == 'Windows'
        shell: pwsh
        run: |
          $files = @("dist\MagicGatherer.exe")
          if (Test-Path "dist\MagicGathererTUI.exe") { $files += "dist\MagicGathererTUI.exe" }
          Compress-Archive -Path $files -DestinationPath "dist\MagicGatherer-Windows.zip"

      # ── Upload ─────────────────────────────────────────────────────────────
      - name: Create Release and Upload
        uses: softprops/action-gh-release@v1
        with:
          files: dist/${{ matrix.artifact }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
